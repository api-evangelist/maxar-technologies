name: satellite-imagery-pipeline
title: Satellite Imagery Discovery-to-Delivery Pipeline
description: >-
  End-to-end Naftiko workflow composition for Maxar/Vantor's spatial-intelligence
  surface: authenticate, search the archive for usable scenes, place an order,
  poll until delivered, and optionally stand up a monitor over the AOI to
  receive future collections. When the archive is insufficient, fall back to
  tasking a new collection on the Vantor Constellation.
provider: maxar-technologies
steps:
  - id: authenticate
    api: authentication
    capability: issue-token
  - id: search-archive
    api: discovery
    capability: search-items
  - id: estimate-cost
    api: ordering
    capability: estimate-order
    when: archive_results > 0
  - id: place-order
    api: ordering
    capability: place-order
    when: archive_results > 0
  - id: poll-order
    api: ordering
    capability: get-order
    repeat: until status == complete
  - id: check-feasibility
    api: tasking
    capability: check-feasibility
    when: archive_results == 0
  - id: submit-task
    api: tasking
    capability: submit-task
    when: archive_results == 0 and feasible
  - id: monitor-aoi
    api: monitoring
    capability: create-monitor
    optional: true
  - id: subscribe-webhook
    api: monitoring
    capability: create-subscription
    optional: true
tags:
  - Workflow
  - Satellite Imagery
  - Earth Observation
  - Discovery to Delivery
