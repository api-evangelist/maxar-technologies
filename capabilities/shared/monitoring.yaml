name: maxar-monitoring
title: Maxar Geospatial Platform Monitoring Capabilities
description: Per-API capabilities for standing watches over areas of interest.
provider: maxar-technologies
api: monitoring
specification: openapi/monitoring-openapi.yml
capabilities:
  - id: list-monitors
    title: List Monitors
    description: List active monitors over user-defined AOIs.
    operation: listMonitors
    method: GET
    path: /monitors
    outputs: [monitors]
    tags: [Read, Monitoring]
  - id: create-monitor
    title: Create Monitor
    description: Create a new monitor over an AOI with cadence and filters.
    operation: createMonitor
    method: POST
    path: /monitors
    inputs: [name, aoi, cadence, filters]
    outputs: [id, status]
    tags: [Write, Monitoring]
  - id: get-monitor
    title: Get Monitor
    description: Retrieve a monitor's configuration.
    operation: getMonitor
    method: GET
    path: /monitors/{monitorId}
    inputs: [monitorId]
    outputs: [id, status, cadence]
    tags: [Read, Monitoring]
  - id: delete-monitor
    title: Delete Monitor
    description: Delete a monitor and stop firing events.
    operation: deleteMonitor
    method: DELETE
    path: /monitors/{monitorId}
    inputs: [monitorId]
    tags: [Write, Monitoring]
  - id: list-events
    title: List Events For Monitor
    description: List events emitted by a monitor (new_image, window_closed, detection).
    operation: listEvents
    method: GET
    path: /monitors/{monitorId}/events
    inputs: [monitorId, since, limit]
    outputs: [events]
    tags: [Read, Monitoring, Events]
  - id: list-subscriptions
    title: List Webhook Subscriptions
    description: List webhook subscriptions for monitor events.
    operation: listSubscriptions
    method: GET
    path: /subscriptions
    outputs: [subscriptions]
    tags: [Read, Webhooks]
  - id: create-subscription
    title: Create Webhook Subscription
    description: Create a webhook subscription for monitor events.
    operation: createSubscription
    method: POST
    path: /subscriptions
    inputs: [monitor_id, target_url, event_types, secret]
    outputs: [id]
    tags: [Write, Webhooks]
