name: maxar-tasking
title: Maxar Geospatial Platform Tasking Capabilities
description: Per-API capabilities for commissioning new satellite collections.
provider: maxar-technologies
api: tasking
specification: openapi/tasking-openapi.yml
capabilities:
  - id: list-tasks
    title: List Tasking Requests
    description: List tasking requests, optionally filtered by status.
    operation: listTasks
    method: GET
    path: /tasks
    inputs: [status, limit]
    outputs: [tasks]
    tags: [Read, Tasking]
  - id: submit-task
    title: Submit Tasking Request
    description: Submit a new tasking request for a satellite collection over an AOI.
    operation: submitTask
    method: POST
    path: /tasks
    inputs: [name, aoi, start, end, priority, platforms, max_cloud_cover, gsd]
    outputs: [id, status, priority]
    tags: [Write, Tasking]
  - id: get-task
    title: Get Task
    description: Retrieve a tasking request and its planned collection windows.
    operation: getTask
    method: GET
    path: /tasks/{taskId}
    inputs: [taskId]
    outputs: [id, status, windows]
    tags: [Read, Tasking]
  - id: cancel-task
    title: Cancel Task
    description: Cancel a submitted tasking request.
    operation: cancelTask
    method: DELETE
    path: /tasks/{taskId}
    inputs: [taskId]
    tags: [Write, Tasking]
  - id: check-feasibility
    title: Check Tasking Feasibility
    description: Check whether a tasking request is feasible for an AOI and time window.
    operation: checkFeasibility
    method: POST
    path: /feasibility
    inputs: [aoi, start, end, platforms]
    outputs: [feasible, windows]
    tags: [Read, Tasking]
  - id: list-task-collections
    title: List Collections For Task
    description: List the imagery collections collected as a result of a tasking request.
    operation: listTaskCollections
    method: GET
    path: /tasks/{taskId}/collections
    inputs: [taskId]
    outputs: [collections]
    tags: [Read, Tasking]
