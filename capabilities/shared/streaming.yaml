name: maxar-streaming
title: Maxar Geospatial Platform Streaming Capabilities
description: Per-API capabilities for OGC WMS/WMTS/WFS streaming services.
provider: maxar-technologies
api: streaming
specification: openapi/streaming-openapi.yml
capabilities:
  - id: wms-get-capabilities
    title: WMS Get Capabilities
    description: List available WMS layers and supported parameters.
    operation: wmsAccess
    method: GET
    path: /wmsaccess
    inputs: [service=WMS, request=GetCapabilities]
    outputs: [capabilities_xml]
    tags: [Read, Streaming, WMS, OGC]
  - id: wms-get-map
    title: WMS Get Map
    description: Render a WMS image of an area of interest.
    operation: wmsAccess
    method: GET
    path: /wmsaccess
    inputs: [service=WMS, request=GetMap, layers, bbox, crs, width, height, format]
    outputs: [image]
    tags: [Read, Streaming, WMS, OGC]
  - id: wmts-get-tile
    title: WMTS Get Tile
    description: Fetch a single WMTS tile for a layer at the requested tile matrix.
    operation: wmtsAccess
    method: GET
    path: /wmtsaccess
    inputs: [service=WMTS, request=GetTile, layer, tilematrixset, tilematrix, tilerow, tilecol, format]
    outputs: [tile]
    tags: [Read, Streaming, WMTS, OGC]
  - id: wfs-get-feature
    title: WFS Get Feature
    description: Query vector features (footprints, AOIs) via WFS.
    operation: wfsAccess
    method: GET
    path: /wfsaccess
    inputs: [service=WFS, request=GetFeature, typeNames, bbox, outputFormat, count]
    outputs: [features]
    tags: [Read, Streaming, WFS, OGC]
  - id: download-image
    title: Download Image
    description: Download a full-resolution image of an AOI as GeoTIFF/JPEG/PNG.
    operation: getImage
    method: GET
    path: /image
    inputs: [bbox, image_id, format, gsd]
    outputs: [image_binary]
    tags: [Read, Streaming, Imagery]
