name: vantor-admin
title: Vantor Hub Account Services Capabilities
description: Per-API capabilities exposed by the Vantor Hub Account Services (Admin) API.
provider: maxar-technologies
api: admin
specification: openapi/admin-openapi.yml
capabilities:
  - id: get-my-account
    title: Get My Account
    description: Retrieve the calling caller's account metadata.
    operation: getMyAccount
    method: GET
    path: /accounts/me
    outputs: [id, name, org_type, status]
    tags: [Read, Account]
  - id: get-account
    title: Get Account
    description: Retrieve metadata for a specific account.
    operation: getAccount
    method: GET
    path: /accounts/{accountId}
    inputs: [accountId]
    outputs: [id, name, org_type, status]
    tags: [Read, Account]
  - id: list-users
    title: List Users
    description: List users belonging to an account.
    operation: listUsers
    method: GET
    path: /accounts/{accountId}/users
    inputs: [accountId]
    outputs: [users]
    tags: [Read, Users]
  - id: invite-user
    title: Invite User
    description: Invite a new user into the account.
    operation: inviteUser
    method: POST
    path: /accounts/{accountId}/users
    inputs: [accountId, email, role]
    outputs: [user]
    tags: [Write, Users]
  - id: remove-user
    title: Remove User
    description: Remove a user from the account.
    operation: removeUser
    method: DELETE
    path: /accounts/{accountId}/users/{userId}
    inputs: [accountId, userId]
    tags: [Write, Users]
  - id: get-credits
    title: Get Credit Balance
    description: Retrieve the credit balance and plan for the account.
    operation: getCredits
    method: GET
    path: /accounts/{accountId}/credits
    inputs: [accountId]
    outputs: [balance, currency, plan, renews_at]
    tags: [Read, Billing]
  - id: list-api-keys
    title: List API Keys
    description: Enumerate API keys provisioned against the account.
    operation: listApiKeys
    method: GET
    path: /accounts/{accountId}/api-keys
    inputs: [accountId]
    outputs: [api_keys]
    tags: [Read, Security]
  - id: create-api-key
    title: Create API Key
    description: Provision a new API key with the requested scopes.
    operation: createApiKey
    method: POST
    path: /accounts/{accountId}/api-keys
    inputs: [accountId, name, scopes]
    outputs: [id, secret, prefix]
    tags: [Write, Security]
  - id: revoke-api-key
    title: Revoke API Key
    description: Revoke an existing API key.
    operation: revokeApiKey
    method: DELETE
    path: /accounts/{accountId}/api-keys/{keyId}
    inputs: [accountId, keyId]
    tags: [Write, Security]
