name: maxar-ordering
title: Maxar Geospatial Platform Ordering Capabilities
description: Per-API capabilities for placing and tracking imagery orders.
provider: maxar-technologies
api: ordering
specification: openapi/ordering-openapi.yml
capabilities:
  - id: list-orders
    title: List Orders
    description: List orders, optionally filtered by status.
    operation: listOrders
    method: GET
    path: /orders
    inputs: [status, limit]
    outputs: [orders]
    tags: [Read, Orders]
  - id: place-order
    title: Place Order
    description: Place a new order against the Maxar archive for an AOI and catalog items.
    operation: placeOrder
    method: POST
    path: /orders
    inputs: [name, aoi, items, delivery, output_format]
    outputs: [id, status, cost]
    tags: [Write, Orders]
  - id: get-order
    title: Get Order
    description: Retrieve order metadata and current status.
    operation: getOrder
    method: GET
    path: /orders/{orderId}
    inputs: [orderId]
    outputs: [id, status, cost, items]
    tags: [Read, Orders]
  - id: cancel-order
    title: Cancel Order
    description: Cancel a pending or in-progress order.
    operation: cancelOrder
    method: DELETE
    path: /orders/{orderId}
    inputs: [orderId]
    tags: [Write, Orders]
  - id: list-deliveries
    title: List Deliveries
    description: List delivery artifacts attached to an order.
    operation: listDeliveries
    method: GET
    path: /orders/{orderId}/deliveries
    inputs: [orderId]
    outputs: [deliveries]
    tags: [Read, Deliveries]
  - id: estimate-order
    title: Estimate Order Cost
    description: Estimate the cost of an order before placing it.
    operation: estimateOrder
    method: POST
    path: /estimates
    inputs: [aoi, items, output_format]
    outputs: [estimated_cost, currency, area_km2]
    tags: [Read, Estimates]
