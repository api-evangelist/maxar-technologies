name: vantor-discovery
title: Vantor Hub Discovery Capabilities
description: Per-API capabilities exposed by the Vantor Hub Discovery API (STAC-aligned search).
provider: maxar-technologies
api: discovery
specification: openapi/discovery-openapi.yml
capabilities:
  - id: search-items
    title: Search Items
    description: STAC-style POST search across imagery collections by geometry, time window and filters.
    operation: searchItems
    method: POST
    path: /search
    inputs: [bbox, intersects, datetime, collections, query, limit]
    outputs: [features, numberMatched, numberReturned]
    tags: [Read, Search, Discovery]
  - id: search-items-get
    title: Search Items By Query
    description: STAC-style GET search using query string parameters.
    operation: searchItemsGet
    method: GET
    path: /search
    inputs: [bbox, datetime, collections, cloud_cover, max_resolution, limit]
    outputs: [features]
    tags: [Read, Search, Discovery]
  - id: list-collections
    title: List Collections
    description: Enumerate the imagery collections available to the caller.
    operation: listCollections
    method: GET
    path: /collections
    outputs: [collections]
    tags: [Read, Discovery]
  - id: get-collection
    title: Get Collection
    description: Retrieve metadata for a single collection (WorldView, Legion, Vivid, etc).
    operation: getCollection
    method: GET
    path: /collections/{collectionId}
    inputs: [collectionId]
    outputs: [id, title, description, extent]
    tags: [Read, Discovery]
  - id: list-collection-items
    title: List Collection Items
    description: List STAC items belonging to a single collection.
    operation: listCollectionItems
    method: GET
    path: /collections/{collectionId}/items
    inputs: [collectionId, bbox, datetime, limit]
    outputs: [features]
    tags: [Read, Discovery]
  - id: get-item
    title: Get Item
    description: Retrieve a single STAC item including asset hrefs.
    operation: getItem
    method: GET
    path: /collections/{collectionId}/items/{itemId}
    inputs: [collectionId, itemId]
    outputs: [id, geometry, properties, assets]
    tags: [Read, Discovery]
