- aid: maxar-technologies:streaming
  name: Maxar Geospatial Platform Streaming API
  description: OGC-standards Streaming services exposing Maxar's current and historical
    imagery as WMS (Web Map Service), WMTS (Web Map Tile Service) and WFS (Web Feature
    Service) layers — supports GetCapabilities, GetMap, GetTile, GetFeature and bulk
    image download. Surfaced through the MGP_SDK Python, Java and R clients.
  humanURL: https://maxar-geospatial-platform.readthedocs.io/en/latest/
  baseURL: https://securewatch.maxar.com/earthservice
