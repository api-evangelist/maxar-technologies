- aid: maxar-technologies:open-data-stac
  name: Maxar Open Data STAC Catalog
  description: Free, public STAC (SpatioTemporal Asset Catalog) of pre- and post-event
    high-resolution Maxar imagery published in support of emergency planning, risk
    assessment, damage assessment and recovery. Hosted on AWS Open Data as Cloud Optimized
    GeoTIFFs (COGs) with STAC JSON metadata and mirrored via the community `opengeos/maxar-open-data`
    index.
  humanURL: https://github.com/opengeos/maxar-open-data
  baseURL: https://maxar-opendata.s3.amazonaws.com
