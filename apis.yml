aid: maxar-technologies
name: Maxar Technologies
description: 'Maxar Technologies was a publicly traded Earth-imaging and space-systems
  company formed from the 2017 merger of MacDonald, Dettwiler and Associates (MDA)
  with DigitalGlobe (founded 1992 in Oakland, California). In December 2022 private-equity
  firm Advent International agreed to take Maxar private in a USD 6.4 billion cash
  deal that closed in May 2023, after which Advent split the company into two operating
  units: Maxar Intelligence (imagery and geospatial software in Westminster, Colorado)
  and Maxar Space Systems (satellite manufacturing in Palo Alto, California). On 1
  October 2025 both units rebranded — Maxar Intelligence became Vantor and Maxar Space
  Systems became Lanteris Space Systems. On 13 January 2026 Intuitive Machines completed
  the acquisition of Lanteris from Advent for approximately USD 800 million, leaving
  Vantor as the sole remaining Advent-owned successor of the Maxar brand. The public
  developer surface for the original Maxar APIs — imagery search, streaming (WMS/WMTS/WFS),
  tasking, ordering, monitoring, authentication and account services — is now delivered
  through the Vantor Hub (hub.vantor.com / pro.maxar.com) and the Maxar Geospatial
  Platform (MGP) SDKs (Python, Java, R). The Maxar Open Data Program continues to
  publish a public STAC catalog of pre-/post-event high-resolution imagery on AWS
  Open Data.'
