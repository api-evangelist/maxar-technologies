- aid: maxar-technologies:discovery
  name: Vantor Hub Discovery API
  description: Search and discovery API across Vantor's "125+ petabytes of imagery
    and derivatives" — high-resolution electro-optical imagery from the WorldView
    and GeoEye constellations, WorldView Legion (six next-generation satellites launched
    2024-2026), basemaps and derivative analytic products. STAC-aligned search by
    area of interest, time window, sensor, cloud cover, resolution and other filters.
  humanURL: https://hub.vantor.com/docs/discovery/
  baseURL: https://api.maxar.com/discovery/v1
