- aid: maxar-technologies:basemaps
  name: Maxar Vivid Basemap API
  description: Vivid is Maxar's cloud-free, color-balanced basemap product — a global
    mosaic refreshed from the WorldView archive. The Vivid Basemap API exposes the
    basemap as OGC tile and feature services through the MGP streaming surface. Documented
    as part of the Vantor "Dynamic Foundation" product family.
