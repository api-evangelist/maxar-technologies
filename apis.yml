  - type: Capability
    url: capabilities/shared/discovery.yaml
- aid: maxar-technologies:admin
  name: Vantor Hub Account Services API
  description: Administrative account-management API for Vantor Hub customers — manage
    users, roles, organisation entitlements, credit balances and API keys against
