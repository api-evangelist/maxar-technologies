- aid: maxar-technologies:tasking
  name: Maxar Geospatial Platform Tasking API
  description: Real-time tasking API for commissioning new satellite collections over
    an area of interest using the Vantor Constellation (WorldView-1/2/3, GeoEye-1
    and the six-satellite WorldView Legion next-generation fleet delivering 30 cm-class
    native resolution). Supports priority levels, collection windows and delivery
    targets.
