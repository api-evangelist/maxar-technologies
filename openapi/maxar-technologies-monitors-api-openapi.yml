openapi: 3.0.3
info:
  title: Vantor Hub Account Services Accounts Monitors API
  description: Administrative account-management API for Vantor Hub customers — manage users, roles, organisation entitlements, credit balances and API keys. Profile derived from public Vantor Hub docs (hub.vantor.com/docs/admin) and Maxar Geospatial Platform `account_service` SDK conventions; field shapes should be confirmed against live Hub responses.
  version: 1.0.0
servers:
- url: https://api.maxar.com/admin/v1
  description: Vantor Hub production
security:
- bearerAuth: []
tags:
- name: Monitors
paths:
  /monitors:
    get:
      tags:
      - Monitors
      summary: List Monitors
      operationId: listMonitors
      responses:
        '200':
          description: Monitors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Monitor'
    post:
      tags:
      - Monitors
      summary: Create Monitor
      operationId: createMonitor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MonitorRequest'
      responses:
        '201':
          description: Monitor created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Monitor'
  /monitors/{monitorId}:
    get:
      tags:
      - Monitors
      summary: Get Monitor
      operationId: getMonitor
      parameters:
      - name: monitorId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Monitor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Monitor'
    delete:
      tags:
      - Monitors
      summary: Delete Monitor
      operationId: deleteMonitor
      parameters:
      - name: monitorId
        in: path
        required: true
        schema:
          type: string
      responses:
        '204':
          description: Deleted
components:
  schemas:
    MonitorRequest:
      type: object
      required:
      - name
      - aoi
      properties:
        name:
          type: string
        aoi:
          type: object
        cadence:
          type: string
          enum:
          - daily
          - weekly
          - on_new_image
        filters:
          type: object
          properties:
            max_cloud_cover:
              type: number
            platforms:
              type: array
              items:
                type: string
    Monitor:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
          enum:
          - active
          - paused
        created_at:
          type: string
          format: date-time
        cadence:
          type: string
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
